<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="main">
            <h1>Metric/Imperial Unit Conversion</h1>
            <div>
                <input type = "text" inputmode = "numeric" pattern = "[0-9]*" id = "input-el">
            </div>
            <button id = "convert-btn">Convert</button>
            <div id="container">
                <div class="conversion">
                    <h2>Length (Meter/Feet)</h2>
                    <p id="length-el"> </p>
                </div>
                <div class="conversion">
                    <h2>Volume (Liters/Gallons)</h2>
                    <p id="volume-el"> </p>
                </div>
                <div class="conversion">
                    <h2>Mass (Kilograms/Pounds)</h2>
                    <p id="mass-el"> </p>
                </div>
            </div>        
        </div>
        <script src="index.js"></script>
    </body>
</html>
